services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: innerscript-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: innerscript
    ports:
      - "5433:5432"
    volumes:
      - innerscript_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d innerscript"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: pgvector/pgvector:pg16
    container_name: innerscript-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: innerscript_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d innerscript_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  innerscript_postgres_data:
